<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MindClaude</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsmind@0.9.1/style/jsmind.css">
</head>
<body>
  <header>
    <div class="toolbar">
      <h1>MindClaude</h1>
      <select id="map-selector">
        <option value="">— Select a map —</option>
      </select>
      <button id="btn-global" style="display:none" title="Back to global map">← Global</button>
      <div id="zoom-controls">
        <button id="btn-zoom-out" title="Zoom out">−</button>
        <span id="zoom-level">100%</span>
        <button id="btn-zoom-in" title="Zoom in">+</button>
        <button id="btn-zoom-fit" title="Fit to screen">Fit</button>
      </div>
      <div class="btn-group">
        <button id="btn-collapse-all" title="Collapse all (show root + 1 level)">⊟ All</button>
        <button id="btn-expand-all" title="Expand all nodes">⊞ All</button>
        <button id="btn-collapse-sel" title="Collapse selected node">⊟ Sel</button>
        <button id="btn-expand-sel" title="Expand selected node">⊞ Sel</button>
      </div>
      <div class="btn-group">
        <button id="btn-add-node" disabled title="Add child (Insert)">+ Child</button>
        <button id="btn-add-sibling" disabled title="Add sibling (Enter)">+ Sib</button>
        <button id="btn-del-node" disabled title="Delete (Del)">− Node</button>
      </div>
      <button id="btn-find" disabled title="Find node (Ctrl+F)">Find</button>
      <div class="btn-group">
        <button id="btn-copy" disabled title="Copy (Ctrl+C)">Copy</button>
        <button id="btn-cut" disabled title="Cut (Ctrl+X)">Cut</button>
        <button id="btn-paste" disabled title="Paste (Ctrl+V)">Paste</button>
      </div>
      <button id="btn-link" disabled title="Link two selected nodes (Ctrl+L) — Ctrl+click two nodes first">Link</button>
      <button id="btn-undo" disabled title="Undo last change (Ctrl+Z)">Undo</button>
      <button id="btn-reload" disabled title="Reload from server">Reload</button>
      <button id="btn-save" disabled>Save</button>
      <button id="btn-versions" disabled title="Version history">Versions</button>
      <button id="btn-new">New Map</button>
      <button id="btn-delete" disabled>Delete</button>
      <button id="btn-theme" title="Toggle light/dark theme">Light</button>
      <span id="status"></span>
    </div>
  </header>
  <div id="main">
    <div id="jsmind-container"></div>
    <div id="node-editor" style="display:none">
      <div class="node-editor-header">
        <span id="node-editor-label">Edit Node</span>
        <div class="node-editor-actions">
          <button id="node-editor-expand" title="Expand editor">&#x2922;</button>
          <button id="node-editor-close" title="Close">×</button>
        </div>
      </div>
      <input type="text" id="node-title-input" placeholder="Title" />
      <select id="node-type-select">
        <option value="">— Type —</option>
        <option value="project">▣ Project</option>
        <option value="agent">◈ Agent</option>
        <option value="bg-agent">◇ Background Agent</option>
        <option value="mcp">⚡ MCP</option>
        <option value="code">⟨⟩ Code</option>
      </select>
      <textarea id="node-desc-input" placeholder="Description (optional)" rows="3"></textarea>
    </div>
  </div>

  <!-- Save Modal -->
  <div id="save-modal" class="modal-overlay" style="display:none">
    <div class="modal-content">
      <h3>Save Map</h3>
      <input type="text" id="save-comment" placeholder="Commit message (optional)" />
      <div class="modal-buttons">
        <button id="save-modal-cancel">Cancel</button>
        <button id="save-modal-confirm">Save</button>
      </div>
      <div id="save-spinner" class="spinner" style="display:none">Saving...</div>
    </div>
  </div>

  <!-- Find Modal -->
  <div id="find-modal" class="modal-overlay" style="display:none">
    <div class="modal-content">
      <h3>Find Node</h3>
      <input type="text" id="find-input" placeholder="Search node text..." />
      <div id="find-results"></div>
      <div class="modal-buttons">
        <button id="find-modal-close">Close</button>
      </div>
    </div>
  </div>

  <!-- Versions Modal -->
  <div id="versions-modal" class="modal-overlay" style="display:none">
    <div class="modal-content modal-wide">
      <h3>Version History</h3>
      <div id="versions-list"></div>
      <div id="versions-spinner" class="spinner" style="display:none">Loading...</div>
      <div class="modal-buttons">
        <button id="versions-load-more" style="display:none">Load more</button>
        <button id="versions-modal-close">Close</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsmind@0.9.1/es6/jsmind.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsmind@0.9.1/es6/jsmind.draggable-node.js"></script>
  <script src="app.js"></script>
</body>
</html>
