<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindClaude</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsmind@0.8.5/style/jsmind.css">
</head>
<body>
  <header>
    <div class="toolbar">
      <h1>MindClaude</h1>
      <select id="map-selector">
        <option value="">— Select a map —</option>
      </select>
      <button id="btn-save" disabled>Save</button>
      <button id="btn-new">New Map</button>
      <button id="btn-delete" disabled>Delete</button>
      <span id="status"></span>
    </div>
  </header>
  <div id="main">
    <div id="jsmind-container"></div>
    <aside id="sidebar">
      <h3>Cross-links</h3>
      <ul id="rel-list"></ul>
      <div id="rel-form">
        <h4>Add cross-link</h4>
        <input id="rel-end1" placeholder="Node ID 1" />
        <input id="rel-end2" placeholder="Node ID 2" />
        <input id="rel-title" placeholder="Label (optional)" />
        <button id="btn-add-rel">Add</button>
      </div>
    </aside>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsmind@0.8.5/js/jsmind.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsmind@0.8.5/js/jsmind.draggable-node.js"></script>
  <script src="app.js"></script>
</body>
</html>
